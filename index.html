<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Prismly</title>

<!-- Favicon -->
<link rel="icon" type="image/png" href="favicon.png">
<link rel="apple-touch-icon" href="favicon.png">

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="app">

  <!-- HOME -->
  <div id="home" class="screen active">
    <h1>✨ Prismly</h1>

    <button onclick="toggleTheme()">🌙 / ☀️</button>

    <a href="https://in.pinterest.com/advait8370/" target="_blank" class="board-btn">
      Open My Pinterest Board
    </a>

    <div id="grid" class="grid"></div>
  </div>

  <!-- SEARCH -->
  <div id="search" class="screen">
    <input id="searchInput" placeholder="Search pins..." oninput="searchPins()">
  </div>

  <!-- ADD -->
  <div id="add" class="screen">
    <input id="pinUrl" placeholder="Paste image URL">
    <button onclick="savePin()">Save</button>
  </div>

  <!-- PROFILE -->
  <div id="profile" class="screen">
    <button onclick="login()">Login</button>
    <button onclick="logout()">Logout</button>
    <p id="user">Not logged in</p>
  </div>

</div>

<!-- NAV -->
<div class="nav">
  <div onclick="switchTab('home')">🏠</div>
  <div onclick="switchTab('search')">🔍</div>
  <div onclick="switchTab('add')">➕</div>
  <div onclick="switchTab('profile')">👤</div>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script src="script.js"></script>

</body>
</html>
